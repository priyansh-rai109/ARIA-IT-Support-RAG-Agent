name: ARIA Enterprise CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest fastapi uvicorn
        
    - name: Lint with flake8
      run: |
        flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: aria-frontend/package-lock.json
        
    - name: Install dependencies
      working-directory: ./aria-frontend
      run: npm ci
      
    - name: Build Next.js
      working-directory: ./aria-frontend
      run: npm run build

  docker-build:
    needs: [backend-tests, frontend-build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
    - uses: actions/checkout@v4
    
    - name: Build and Push Docker Images
      run: |
        echo "Docker build step placeholder. In production, add docker login and push to ECR/GHCR."
        docker compose build
