apiVersion: apps/v1
kind: Deployment
metadata:
  name: aria-frontend
  labels:
    app: aria-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aria-frontend
  template:
    metadata:
      labels:
        app: aria-frontend
    spec:
      containers:
      - name: aria-frontend
        image: aria-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "https://api.aria.local"
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "250m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: aria-frontend-svc
spec:
  selector:
    app: aria-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
